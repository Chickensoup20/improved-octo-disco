name: Zip Assets on Merge

on:
  push:
    branches:
      - main   # change to your default branch if different (e.g. master)

permissions:
  contents: write

jobs:
  zip-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove old assets.zip
        run: rm -f assets.zip

      - name: Create new assets.zip (excluding itself and .git)
        run: |
          zip -r assets.zip . \
            -x "assets.zip" \
            -x ".git/*" \
            -x ".git"

      - name: Commit and push updated assets.zip
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add assets.zip
          if ! git diff --cached --quiet; then
            git commit -m "chore: update assets.zip [skip ci]"
            git push
          else
            echo "No changes to assets.zip, skipping commit."
          fi
